name: Build BlueEngine

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install NASM and Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib dosfstools mtools

    - name: Configure CMake
      run: |
        rm -rf build
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_ASM_NASM_OBJECT_FORMAT=elf32

    - name: Build Kernel
      run: cmake --build build --config Release

    - name: Generate boot.img
      run: |
        dd if=/dev/zero of=build/boot.img bs=1024 count=1440
        dd if=build/blue_game_engine of=build/boot.img conv=notrunc

    - name: Generate system.img (FAT File System)
      run: |
        # Cria uma imagem zerada de 10MB para o sistema
        dd if=/dev/zero of=build/system.img bs=1M count=10
        
        # Formata a imagem como FAT16 com o rótulo SYSTEM
        mkfs.vfat -F 16 -n "SYSTEM" build/system.img
        
        # Copia todo o conteúdo da pasta sysroot/ para a raiz do arquivo system.img
        if [ -d "sysroot" ]; then
          mcopy -i build/system.img -s sysroot/* ::/
        fi

    - name: Upload Boot Image Artifact (boot.img)
      uses: actions/upload-artifact@v4
      with:
        name: boot-image
        path: build/boot.img

    - name: Upload System Image Artifact (system.img)
      uses: actions/upload-artifact@v4
      with:
        name: system-image
        path: build/system.img
        

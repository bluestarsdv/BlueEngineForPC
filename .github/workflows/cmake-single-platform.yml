name: Build BlueEngine ISO

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install NASM, Build Tools and ISO Maker
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib dosfstools mtools xorriso

    - name: Configure CMake
      run: |
        rm -rf build
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_ASM_NASM_OBJECT_FORMAT=elf32

    - name: Build Kernel
      run: cmake --build build --config Release

    - name: Generate boot.img
      run: |
        dd if=/dev/zero of=build/boot.img bs=1024 count=1440
        dd if=build/blue_game_engine of=build/boot.img conv=notrunc

    - name: Generate system.img (FAT File System)
      run: |
        # 1. Cria a imagem zerada de 10MB
        dd if=/dev/zero of=build/system.img bs=1M count=10
        
        # 2. Formata a imagem como FAT16 com o rótulo SYSTEM
        mkfs.vfat -F 16 -n "SYSTEM" build/system.img
        
        # 3. Copia a estrutura de sysroot se existir no repositório
        if [ -d "sysroot" ]; then
          mcopy -i build/system.img -s sysroot/* ::/
        fi

        # 4. Cria a pasta /dev na raiz da system.img
        mmd -i build/system.img ::/dev

        # 5. Cria os arquivos marcadores de dispositivos dentro de /dev
        # (O Kernel utilizará estes pontos de montagem para abstração dos drivers)
        
        # Pseudo-dispositivos básicos
        mcopy -i build/system.img /dev/null ::/dev/null 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/null
        mcopy -i build/system.img /dev/null ::/dev/zero 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/zero
        mcopy -i build/system.img /dev/null ::/dev/full 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/full
        mcopy -i build/system.img /dev/null ::/dev/random 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/random
        mcopy -i build/system.img /dev/null ::/dev/urandom 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/urandom

        # Console e Framebuffer de Vídeo
        mcopy -i build/system.img /dev/null ::/dev/console 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/console
        mcopy -i build/system.img /dev/null ::/dev/tty 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/tty
        mcopy -i build/system.img /dev/null ::/dev/fb0 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/fb0

        # Dispositivos de Armazenamento
        mcopy -i build/system.img /dev/null ::/dev/sda 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/sda
        mcopy -i build/system.img /dev/null ::/dev/sda1 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/sda1
        mcopy -i build/system.img /dev/null ::/dev/fd0 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/fd0

        # Redirecionamentos padrão (stdin, stdout, stderr)
        mcopy -i build/system.img /dev/null ::/dev/stdin 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/stdin
        mcopy -i build/system.img /dev/null ::/dev/stdout 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/stdout
        mcopy -i build/system.img /dev/null ::/dev/stderr 2>/dev/null || echo -n "" | mcopy -i build/system.img - ::/dev/stderr

    - name: Generate ISO Image (blue_engine.iso)
      run: |
        # Prepara a pasta temporária para criar a ISO
        mkdir -p build/iso_root
        
        # Copia boot.img e system.img para dentro do diretório raiz da ISO
        cp build/boot.img build/iso_root/boot.img
        cp build/system.img build/iso_root/system.img
        
        # Empacota tudo em blue_engine.iso com boot El Torito
        xorriso -as mkisofs \
          -b boot.img \
          -no-emul-boot \
          -boot-load-size 4 \
          -boot-info-table \
          -o build/blue_engine.iso \
          build/iso_root

    - name: Upload Single ISO Artifact (blue_engine.iso)
      uses: actions/upload-artifact@v4
      with:
        name: blue-engine-iso
        path: build/blue_engine.iso
        

# ===================================================================
# BLUE OS CONFIGURATION - /sysroot/data/config/system.cfg
# ===================================================================

[boot]
version=1.0.0
video_mode=VGA_80x25
splash_screen=true

[security]
enforce_abge_sandbox=true
firebase_sync=true

[paths]
system_pak_dir=/sysroot/system
apps_dir=/sysroot/data/apps
games_dir=/sysroot/data/games
